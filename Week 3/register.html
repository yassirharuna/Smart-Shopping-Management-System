<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMART SHOP MANAGEMENT SYSTEM - Register</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <div class="main-content" style="margin-left: 0; padding-top: 4rem; max-width: 560px; margin-right: auto; margin-left: auto;">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Create Account</div>
      </div>
      <div class="card-body" style="padding: var(--spacing-lg);">
        <form id="registerForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="name">Full Name</label>
              <input class="form-input" id="name" name="name" type="text" placeholder="Your name" required />
              <div class="form-error" id="nameError"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="phone">Phone (optional)</label>
              <input class="form-input" id="phone" name="phone" type="text" placeholder="e.g. +254..." />
              <div class="form-error" id="phoneError"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" id="email" name="email" type="email" placeholder="you@example.com" required />
            <div class="form-error" id="emailError"></div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input class="form-input" id="password" name="password" type="password" placeholder="At least 6 characters" required />
              <div class="form-error" id="passwordError"></div>
            </div>
            <div class="form-group">
              <label class="form-label" for="role">Role (optional)</label>
              <select class="form-select" id="role" name="role">
                <option value="">staff</option>
                <option value="admin">admin</option>
                <option value="staff">staff</option>
              </select>
              <div class="form-hint">Default role is staff.</div>
            </div>
          </div>

          <button class="btn btn-primary w-100" id="btnSubmit" type="submit">Register</button>

          <p class="text-muted" style="margin-top: 1rem;">
            During assessment, login will work after your user account is created.
          </p>

          <div style="margin-top: 1rem; display:flex; gap: 0.75rem;">
            <a class="btn btn-secondary w-100" href="/login">Back to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/auth.js"></script>
</body>
</html>

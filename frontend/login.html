<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMART SHOP MANAGEMENT SYSTEM - Login</title>
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <div class="main-content" style="margin-left: 0; padding-top: 4rem; max-width: 520px; margin-right: auto; margin-left: auto;">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Login</div>
      </div>
      <div class="card-body" style="padding: var(--spacing-lg);">
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input class="form-input" id="email" name="email" type="email" placeholder="you@example.com" required />
            <div class="form-error" id="emailError"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-input" id="password" name="password" type="password" placeholder="••••••" required />
            <div class="form-error" id="passwordError"></div>
          </div>

          <button class="btn btn-primary w-100" id="btnSubmit" type="submit">Login</button>

          <p class="text-muted" style="margin-top: 1rem;">
            No cookies are used. JWT is stored in localStorage.
          </p>

          <div style="margin-top: 1rem; display:flex; gap: 0.75rem;">
            <a class="btn btn-secondary w-100" href="/register">Register</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/auth.js"></script>
</body>
</html>
